server {
    listen 80;
    server_name dgifipe.com.br www.dgifipe.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dgifipe.com.br www.dgifipe.com.br;

    root /root/dgifipe/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/dgifipe.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dgifipe.com.br/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /build {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
